dependencies:
  - bom: $libs.spring.boot.dependencies
  - bom: $libs.spring.cloud.dependencies

settings:
  kotlin:
    allOpen:
      enabled: true
      presets:
        - spring
    noArg:
      enabled: true
      presets:
        - jpa
    freeCompilerArgs: [ -Xannotation-default-target=param-property ]
