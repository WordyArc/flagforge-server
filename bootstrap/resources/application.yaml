spring:
  application.name: flagforge-server

app:
  persistence:
    enabled: true
    auto-create-topics: true
    kafka:
      bootstrap-servers: host.docker.internal:9092
      client-id: flagforge-server
    flag-commands:
      name: flag-commands
      concurrency: 1
      partitions: 1
      replication-factor: 1
      topic-config:
        retention.ms: "86400000"
    flag-events:
      name: flag-events
      concurrency: 1
      partitions: 1
    flag-state:
      name: flag-state
      concurrency: 1
      partitions: 1
      replication-factor: 1
    segment-state:
      name: segment-state
      concurrency: 1
      partitions: 1
    env-state:
      name: env-state
      concurrency: 1
      partitions: 1
    project-state:
      name: project-state
      concurrency: 1
      partitions: 1
    sdk-keys:
      name: sdk-keys
      concurrency: 1
      partitions: 1
