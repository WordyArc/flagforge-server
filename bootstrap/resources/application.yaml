spring:
  application.name: flagforge-server

app:
  persistence:
    enabled: true # включена ли подсистема persistence
    auto-create-topics: true # true - создать топики; false - не создаем, но валидируем существующие
    kafka:
      bootstrap-servers: host.docker.internal:9092
      client-id: flagforge-server
    command-messages:
      name: command-messages
      concurrency: 1
      partitions: 1
      replication-factor: 1
      topic-config:
        retention.ms: "86400000"
    event-messages:
      name: event-messages
      concurrency: 1
      partitions: 1
    flag-state:
      name: flag-state
      concurrency: 1
      partitions: 1
      replication-factor: 1
    segment-state:
      name: segment-state
      concurrency: 1
      partitions: 1
    env-state:
      name: env-state
      concurrency: 1
      partitions: 1
    project-state:
      name: project-state
      concurrency: 1
      partitions: 1
    sdk-keys:
      name: sdk-keys
      concurrency: 1
      partitions: 1
