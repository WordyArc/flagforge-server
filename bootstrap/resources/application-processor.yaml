server.port: 8183

spring:
  application:
    name: flagforge-processor

app:
  persistence:
    enabled: true
    auto-create-topics: true
    kafka:
      bootstrap-servers: host.docker.internal:9092
      streams:
        application-id: flagforge-processor
        properties:
          processing.guarantee: exactly_once_v2
          #default.deserialization.exception.handler: org.apache.kafka.streams.errors.LogAndFailExceptionHandler
          #default.value.serde: org.springframework.kafka.support.serializer.JsonSerde
          auto.offset.reset: earliest
  streams:
    processor:
      application-id: flagforge-processor
      state-dir: data/streams/flagforge-processor
      flag-state:
        store-name: flag-state
      project-state:
        store-name: project-state
      env-state:
        store-name: env-state
      segment-state:
        store-name: segment-state
      flag-key-index:
        store-name: flag-key-index
        topic-name: flag-key-index
